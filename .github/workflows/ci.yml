name: CI — Lint, Test, Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Backend ────────────────────────────────────────────────────────
  backend-lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aeka
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: aeka_test
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U aeka" --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: backend
        run: |
          ruff check .
          ruff format --check .

      - name: Type check with mypy
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

      - name: Run tests
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: aeka
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: aeka_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          OPENAI_API_KEY: sk-test-fake-key
          ANTHROPIC_API_KEY: sk-ant-test-fake-key
        run: pytest --cov=app --cov-report=xml -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ─── Frontend ───────────────────────────────────────────────────────
  frontend-lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: frontend
        run: npm test -- --passWithNoTests

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  # ─── Docker Build ───────────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t aeka-backend:test --target production backend/

      - name: Build frontend image
        run: docker build -t aeka-frontend:test --target production frontend/
