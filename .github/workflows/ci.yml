name: CI — Lint, Test, Build

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Backend ────────────────────────────────────────────────────────
  backend-lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aeka
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: aeka_test
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U aeka" --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: backend
        run: |
          ruff check .
          ruff format --check .

      - name: Type check with mypy
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

      - name: Run tests
        working-directory: backend
        env:
          APP_ENV: development
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: aeka
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: aeka_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          OPENAI_API_KEY: sk-test-fake-key
          ANTHROPIC_API_KEY: sk-ant-test-fake-key
          CLERK_SECRET_KEY: sk_test_fake
          CLERK_PUBLISHABLE_KEY: pk_test_fake
          CLERK_JWKS_URL: ""
          R2_ENDPOINT_URL: http://localhost:9000
          R2_ACCESS_KEY_ID: test
          R2_SECRET_ACCESS_KEY: test
          R2_BUCKET_NAME: test-bucket
          R2_ACCOUNT_ID: test
        run: pytest --cov=app --cov-report=xml -v

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ─── Frontend ───────────────────────────────────────────────────────
  frontend-lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: frontend
        run: npm test -- --passWithNoTests

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_fake
        run: npm run build

  # ─── Security Scan ─────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend deps
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Check for known vulnerabilities (pip-audit)
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit --ignore-vuln PYSEC-2024-* || true

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ─── Docker Build ───────────────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t aeka-backend:test --target production backend/

      - name: Build frontend image
        run: docker build -t aeka-frontend:test --target production frontend/

  # ─── Dockerfile Security Lint ───────────────────────────────────────
  dockerfile-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint backend Dockerfile
        run: npx @aquasecurity/trivy config backend/Dockerfile --exit-code 0

      - name: Lint frontend Dockerfile
        run: npx @aquasecurity/trivy config frontend/Dockerfile --exit-code 0
