name: Deploy to Staging

on:
  push:
    branches: [develop]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/aeka/backend:${{ github.sha }} \
                       -t ${{ env.ECR_REGISTRY }}/aeka/backend:latest \
                       --target production backend/
          docker push ${{ env.ECR_REGISTRY }}/aeka/backend --all-tags

      - name: Build and push frontend
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/aeka/frontend:${{ github.sha }} \
                       -t ${{ env.ECR_REGISTRY }}/aeka/frontend:latest \
                       --target production frontend/
          docker push ${{ env.ECR_REGISTRY }}/aeka/frontend --all-tags

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster aeka-staging \
            --service aeka-backend \
            --force-new-deployment

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster aeka-staging \
            --service aeka-frontend \
            --force-new-deployment

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster aeka-staging \
            --services aeka-backend aeka-frontend

      - name: Run smoke tests
        run: |
          BACKEND_URL=$(aws ecs describe-services --cluster aeka-staging --services aeka-backend --query 'services[0].loadBalancers[0].targetGroupArn' --output text)
          curl -sf http://staging.aeka.example.com/health || exit 1
          echo "✓ Staging deployment healthy"
